<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>전국 보건 시설 지도 · 건강생활지원센터 + 치매센터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<style>
:root{
  --bg:#FAF7F2;--bg-elev:#FFFFFF;--text:#1A1A1A;--text-mute:#666;--text-faint:#999;
  --border:#E5E0D8;--border-strong:#1A1A1A;
  --health:#2F9E44;--dementia:#845EF7;--warn:#DC3545;--accent:#FD7E14;--gold:#FAB005;--lime:#74B816;
  --sans:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:var(--sans);color:var(--text);background:var(--bg)}
.mono{font-family:var(--mono)}

header{position:fixed;top:0;left:0;right:0;z-index:30;background:var(--bg);
  border-bottom:1px solid var(--border-strong);padding:9px 16px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:15px;font-weight:700;margin:0;letter-spacing:-.2px}
header .meta{font-family:var(--mono);font-size:11px;color:var(--text-mute)}
header .pill{font-family:var(--mono);font-size:10.5px;font-weight:700;
  border:1px solid var(--border-strong);padding:2px 8px;border-radius:2px}
.pill.h{border-color:var(--health);color:var(--health)}
.pill.d{border-color:var(--dementia);color:var(--dementia)}
.pill.t{background:var(--text);color:#fff;border-color:var(--text)}
.tabs{margin-left:auto;display:flex;border:1px solid var(--border-strong);border-radius:2px;overflow:hidden}
.tabs button{font-family:var(--mono);font-size:11px;font-weight:700;border:0;background:var(--bg-elev);
  color:var(--text-mute);padding:6px 14px;cursor:pointer}
.tabs button.on{background:var(--text);color:#fff}
.tabs button+button{border-left:1px solid var(--border-strong)}

/* ── A: 지도 ── */
#mapview{position:fixed;top:44px;left:0;right:340px;bottom:0;background:var(--bg-elev)}
#map{position:absolute;inset:0}
.map-status{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;padding:30px;text-align:center;background:var(--bg)}
.map-status .ico{font-size:36px}
.map-status h2{margin:0;font-size:15px;font-weight:700}
.map-status p{margin:0;font-size:12px;color:var(--text-mute);max-width:480px;line-height:1.6}
.map-status code{font-family:var(--mono);font-size:11px;background:var(--text);color:#fff;padding:6px 10px;border-radius:2px;display:inline-block}
.map-status .url{font-family:var(--mono);font-size:11.5px;color:var(--accent);word-break:break-all}

aside{position:fixed;top:44px;right:0;bottom:0;width:340px;
  background:var(--bg-elev);border-left:1px solid var(--border-strong);
  display:flex;flex-direction:column;overflow:hidden;z-index:10}
.panel{padding:12px 14px;border-bottom:1px solid var(--border)}
.panel h2{font-size:10.5px;font-weight:700;letter-spacing:.5px;margin:0 0 8px;
  text-transform:uppercase;color:var(--text-mute);font-family:var(--mono)}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.kpi .cell{border:1px solid var(--border-strong);padding:7px 9px;border-radius:2px;background:var(--bg)}
.kpi .lab{font-family:var(--mono);font-size:9.5px;color:var(--text-mute);letter-spacing:.4px}
.kpi .val{font-family:var(--mono);font-size:18px;font-weight:700;margin-top:2px;line-height:1}
.kpi .val.h{color:var(--health)} .kpi .val.d{color:var(--dementia)}
.kpi .sub{font-family:var(--mono);font-size:9.5px;color:var(--text-faint);margin-top:2px}

.toggles{display:flex;border:1px solid var(--border-strong);border-radius:2px;overflow:hidden}
.toggles button{flex:1;font-family:var(--mono);font-size:11px;font-weight:700;border:0;
  background:var(--bg-elev);color:var(--text-mute);padding:7px 0;cursor:pointer}
.toggles button.on{background:var(--text);color:#fff}
.toggles button+button{border-left:1px solid var(--border-strong)}

input[type=search],select{width:100%;font-family:var(--mono);font-size:11px;padding:6px 8px;
  border:1px solid var(--border-strong);border-radius:2px;background:var(--bg-elev);color:var(--text)}
input[type=search]{font-family:var(--sans)}

.list{flex:1;overflow-y:auto;padding:0}
.row{padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px}
.row:hover{background:var(--bg)}
.row.active{background:#FFF3E0}
.row .top{display:flex;justify-content:space-between;align-items:baseline;gap:6px}
.row .name{font-weight:700;font-size:12px;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .tag{font-family:var(--mono);font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:2px;flex-shrink:0}
.row .tag.h{background:var(--health);color:#fff}
.row .tag.d{background:var(--dementia);color:#fff}
.row .addr{font-size:10.5px;color:var(--text-mute);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta{font-family:var(--mono);font-size:10px;color:var(--text-faint);margin-top:2px}
.empty{padding:30px 14px;text-align:center;color:var(--text-faint);font-size:11px}

/* Leaflet popup */
.leaflet-popup-content-wrapper{border-radius:2px;border:1px solid var(--border-strong);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.leaflet-popup-content{margin:0;font-family:var(--sans)}
.leaflet-popup-tip{border:1px solid var(--border-strong)}
.iw{padding:11px 13px;font-family:var(--sans);font-size:12px;min-width:280px;max-width:340px}
.iw .tag{display:inline-block;font-family:var(--mono);font-size:9.5px;font-weight:700;
  padding:1px 6px;border-radius:2px;color:#fff;margin-bottom:4px}
.iw .tag.h{background:var(--health)} .iw .tag.d{background:var(--dementia)}
.iw h3{margin:0 0 6px;font-size:13.5px;font-weight:700;letter-spacing:-.2px}
.iw .field{margin-top:4px;color:var(--text-mute);font-size:11px;line-height:1.5}
.iw .field .k{display:inline-block;width:54px;font-family:var(--mono);font-size:10px;
  color:var(--text-faint);letter-spacing:.3px}
.iw .programs{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--text-mute);line-height:1.45}
.iw .staff,.iw .equips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.iw .staff span,.iw .equips span{font-family:var(--mono);font-size:10px;background:var(--bg);
  border:1px solid var(--border);padding:1px 6px;border-radius:2px;color:var(--text-mute)}
.iw .staff b,.iw .equips b{color:var(--text)}

/* Custom marker + cluster */
.facmark{width:18px;height:18px;border-radius:50%;border:1.5px solid #1A1A1A;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.facmark.h{background:#2F9E44}
.facmark.d{background:#845EF7}
.marker-cluster{background:transparent}
.marker-cluster div{background:#1A1A1A;color:#fff;font-family:'JetBrains Mono',monospace;
  font-weight:700;font-size:11px;border:1px solid #1A1A1A;border-radius:2px;
  width:30px;height:30px;line-height:28px;text-align:center;margin-left:5px;margin-top:5px}
.marker-cluster span{line-height:30px}

/* ── B: 대시보드 ── */
#dash{position:absolute;top:44px;left:0;right:0;min-height:calc(100% - 44px);background:var(--bg);
  padding:18px 22px 60px;display:none}
.wrap{max-width:1180px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:16px}
.bigkpi{border:1px solid var(--border-strong);border-radius:2px;background:var(--bg-elev);padding:11px 12px}
.bigkpi .k{font-size:10px;color:var(--text-faint);font-family:var(--mono);letter-spacing:.4px;
  display:flex;align-items:center;gap:5px}
.bigkpi .k .dot{width:7px;height:7px;border-radius:50%}
.bigkpi .v{font-family:var(--mono);font-size:22px;font-weight:700;margin-top:4px;line-height:1}
.bigkpi .v.h{color:var(--health)} .bigkpi .v.d{color:var(--dementia)}
.bigkpi .s{font-size:10px;color:var(--text-mute);margin-top:3px;font-family:var(--mono)}

.card{border:1px solid var(--border-strong);border-radius:2px;background:var(--bg-elev);padding:14px 15px;margin-bottom:13px}
.card h2{font-size:12.5px;margin:0 0 11px;font-weight:700;letter-spacing:-.2px;
  display:flex;align-items:baseline;gap:8px}
.card h2 .sub{font-size:10.5px;color:var(--text-faint);font-family:var(--mono);font-weight:400}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}

.brow{display:grid;grid-template-columns:48px 1fr 64px;gap:9px;align-items:center;margin:5px 0;font-size:11px}
.brow .nm{font-family:var(--mono);color:var(--text);font-weight:500}
.brow .bar{height:14px;background:#F0EBE3;border:1px solid var(--border);border-radius:2px;display:flex;overflow:hidden}
.brow .bar i{display:block;height:100%}
.brow .vv{font-family:var(--mono);text-align:right;color:var(--text-mute);font-size:10.5px}
.brow .vv b{color:var(--text);font-weight:700}

table.tidy{width:100%;border-collapse:collapse;font-size:11px}
table.tidy th,table.tidy td{padding:5px 7px;border-bottom:1px solid var(--border);text-align:left}
table.tidy th{font-family:var(--mono);font-size:9.5px;color:var(--text-faint);font-weight:500;letter-spacing:.3px;text-transform:uppercase}
table.tidy td.n{font-family:var(--mono);text-align:right;color:var(--text-mute)}

.tagcloud{display:flex;flex-wrap:wrap;gap:5px}
.tagcloud span{font-family:var(--mono);font-size:11px;background:var(--bg);border:1px solid var(--border);
  padding:3px 8px;border-radius:2px;color:var(--text-mute)}
.tagcloud span b{font-weight:700;color:var(--text);margin-left:5px}

.equipgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.equipgrid .e{border:1px solid var(--border);background:var(--bg);padding:8px 10px;border-radius:2px}
.equipgrid .e .nm{font-size:11px;font-weight:500}
.equipgrid .e .pct{font-family:var(--mono);font-size:15px;font-weight:700;margin-top:3px;color:var(--health)}
.equipgrid .e .bar{height:4px;background:#F0EBE3;border-radius:2px;margin-top:5px;overflow:hidden}
.equipgrid .e .bar i{display:block;height:100%;background:var(--health)}

.note{font-size:11px;color:var(--text-mute);line-height:1.5;background:var(--bg);
  border-left:3px solid var(--text);padding:8px 11px;margin-top:10px}
</style></head><body>

const map = L.map('map', { zoomControl: true, preferCanvas: true })
  .setView([36.5, 127.8], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

const cluster = L.markerClusterGroup({
  showCoverageOnHover: false,
  spiderfyOnMaxZoom: true,
  disableClusteringAtZoom: 12,
  maxClusterRadius: 50,
  iconCreateFunction: c => L.divIcon({
    html: `<div><span>${c.getChildCount()}</span></div>`,
    className: 'marker-cluster',
    iconSize: L.point(40, 40)
  })
});

const markers = new Map(); // idx -> marker
let activeRowEl = null;

DATA.forEach((d, i) => {
  if (!d.lat || !d.lng) return;
  const icon = L.divIcon({
    className: '',
    html: `<div class="facmark ${d.ds==='health'?'h':'d'}"></div>`,
    iconSize: [18, 18], iconAnchor: [9, 9], popupAnchor: [0, -9]
  });
  const m = L.marker([d.lat, d.lng], { icon, title: d.name });
  m.bindPopup(popupHtml(d), { maxWidth: 360, autoPanPadding: [40, 40] });
  m._dsIdx = i;
  markers.set(i, m);
});

function popupHtml(d){
  const tag = d.ds==='health'?'h':'d';
  const tagName = d.ds==='health'?'건강생활':'치매';
  const staff = Object.entries(d.staff).filter(([k,v])=>v>0)
    .map(([k,v])=>`<span>${k} <b>${v}</b></span>`).join('') || '<span style="color:var(--text-faint)">인력 정보 없음</span>';
  const equips = Object.entries(d.equip||{}).filter(([k,v])=>v)
    .map(([k,v])=>`<span>${k}</span>`).join('');
  return `<div class="iw">
    <span class="tag ${tag}">${tagName} · ${escapeHtml(d.subtype||'')}</span>
    <h3>${escapeHtml(d.name)}</h3>
    <div class="field"><span class="k">주소</span>${escapeHtml(d.addr||'-')}</div>
    <div class="field"><span class="k">전화</span><span class="mono">${escapeHtml(d.tel||'-')}</span></div>
    ${d.hours&&d.hours.replace(/[~\s]/g,'')?`<div class="field"><span class="k">운영</span><span class="mono">${escapeHtml(d.hours)}</span></div>`:''}
    ${d.off?`<div class="field"><span class="k">휴무</span>${escapeHtml(d.off)}</div>`:''}
    ${d.mgmt?`<div class="field"><span class="k">관리</span>${escapeHtml(d.mgmt)}</div>`:''}
    ${d.programs?`<div class="programs">${escapeHtml(d.programs)}</div>`:''}
    <div class="staff">${staff}</div>
    ${equips?`<div class="equips">${equips}</div>`:''}
  </div>`;
}

// ── filters / list
const state = {ds:'all', sido:'', q:'', items:DATA};

function applyFilters(){
  const q = state.q.trim().toLowerCase();
  state.items = DATA.filter(d => {
    if (state.ds!=='all' && d.ds!==state.ds) return false;
    if (state.sido && d.sido!==state.sido) return false;
    if (q && !(d.name.toLowerCase().includes(q) || (d.addr||'').toLowerCase().includes(q) || (d.mgmt||'').toLowerCase().includes(q))) return false;
    return true;
  });
  refreshMarkers();
  refreshSideKpi();
  refreshList();
}

function refreshMarkers(){
  cluster.clearLayers();
  const visible = state.items.map(d => markers.get(DATA.indexOf(d))).filter(Boolean);
  cluster.addLayers(visible);
  if (!map.hasLayer(cluster)) map.addLayer(cluster);
}

function refreshSideKpi(){
  const items = state.items;
  const nH = items.filter(d=>d.ds==='health').length;
  const nD = items.filter(d=>d.ds==='dementia').length;
  const sidoSet = new Set(items.map(d=>d.sido).filter(Boolean));
  const withDoc = items.filter(d=>d.staff.의사>0).length;
  document.getElementById('sidekpi').innerHTML = `
    <div class="cell"><div class="lab">건강생활</div><div class="val h">${nH}</div><div class="sub">개소</div></div>
    <div class="cell"><div class="lab">치매</div><div class="val d">${nD}</div><div class="sub">개소</div></div>
    <div class="cell"><div class="lab">시·도</div><div class="val">${sidoSet.size}</div><div class="sub">/17 커버</div></div>
    <div class="cell"><div class="lab">의사 보유</div><div class="val">${withDoc}</div><div class="sub">${items.length?Math.round(100*withDoc/items.length):0}%</div></div>
  `;
}

function refreshList(){
  const ul = document.getElementById('list');
  const items = state.items.slice(0,400);
  document.getElementById('list-count').textContent = `(${state.items.length}${state.items.length>400?', 상위 400':''})`;
  if (!items.length){ ul.innerHTML='<div class="empty">조건에 맞는 시설이 없습니다.</div>'; return; }
  ul.innerHTML = items.map(d => {
    const tag = d.ds==='health'?'h':'d';
    const tagName = d.ds==='health'?'건강':'치매';
    return `<div class="row" data-idx="${DATA.indexOf(d)}">
      <div class="top"><span class="name">${escapeHtml(d.name)}</span><span class="tag ${tag}">${tagName}</span></div>
      <div class="addr">${escapeHtml(d.addr||'')}</div>
      <div class="meta">${escapeHtml(d.sido||'')} · ${escapeHtml(d.subtype||'')} · 인력 ${d.staff_total}</div>
    </div>`;
  }).join('');
  ul.querySelectorAll('.row').forEach(el => {
    el.addEventListener('click',()=>{
      const idx = +el.dataset.idx;
      const m = markers.get(idx);
      if (m){
        const ll = m.getLatLng();
        map.setView(ll, Math.max(map.getZoom(), 13));
        cluster.zoomToShowLayer(m, () => m.openPopup());
        if (activeRowEl) activeRowEl.classList.remove('active');
        el.classList.add('active');
        activeRowEl = el;
      }
    });
  });
}

// 시·도 셀렉트 채우기
{
  const sel = document.getElementById('sido-filter');
  SIDO_ORDER.forEach(s => {
    if (DATA.some(d => d.sido===s)){
      const o = document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o);
    }
  });
  sel.addEventListener('change', e => { state.sido=e.target.value; applyFilters(); });
}
document.getElementById('ds-toggles').addEventListener('click', e => {
  if (e.target.tagName!=='BUTTON') return;
  document.querySelectorAll('#ds-toggles button').forEach(b=>b.classList.remove('on'));
  e.target.classList.add('on');
  state.ds = e.target.dataset.v;
  applyFilters();
});
document.getElementById('search').addEventListener('input', e => {
  state.q = e.target.value;
  applyFilters();
});

applyFilters();

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

// ── B: dashboard render
let dashRendered = false;
function renderDash(){
  if (dashRendered) return; dashRendered = true;
  const t = AGG.totals;

  const kpis = `<div class="kpis">
    <div class="bigkpi"><div class="k"><span class="dot" style="background:var(--text)"></span>전체 시설</div><div class="v">${t.all}</div><div class="s">개소</div></div>
    <div class="bigkpi"><div class="k"><span class="dot" style="background:var(--health)"></span>건강생활</div><div class="v h">${t.health}</div><div class="s">개소</div></div>
    <div class="bigkpi"><div class="k"><span class="dot" style="background:var(--dementia)"></span>치매</div><div class="v d">${t.dementia}</div><div class="s">개소</div></div>
    <div class="bigkpi"><div class="k">시·도 커버</div><div class="v">${t.sido_covered}</div><div class="s">/17</div></div>
    <div class="bigkpi"><div class="k">의사 보유</div><div class="v">${t.with_doctor}</div><div class="s">시설 (${Math.round(100*t.with_doctor/t.all)}%)</div></div>
    <div class="bigkpi"><div class="k">평균 인력</div><div class="v">${t.avg_staff_h} <span style="font-size:13px;color:var(--text-mute)"> / ${t.avg_staff_d}</span></div><div class="s">건강생활 / 치매</div></div>
  </div>`;

  const max = Math.max(...AGG.by_sido.map(r=>r.total), 1);
  const sidoBars = AGG.by_sido.map(r => {
    const hp = r.health/max*100, dp = r.dementia/max*100;
    return `<div class="brow">
      <span class="nm">${r.sido}</span>
      <div class="bar"><i style="width:${hp}%;background:var(--health)"></i><i style="width:${dp}%;background:var(--dementia)"></i></div>
      <span class="vv"><b>${r.total}</b> <span style="color:var(--health)">${r.health}</span>/<span style="color:var(--dementia)">${r.dementia}</span></span>
    </div>`;
  }).join('');

  const hSubRows = AGG.h_subtypes.map(([k,v]) => `<tr><td>${k}</td><td class="n"><b style="color:var(--health)">${v}</b></td><td class="n">${(100*v/t.health).toFixed(1)}%</td></tr>`).join('');
  const dSubRows = AGG.d_subtypes.map(([k,v]) => `<tr><td>${k}</td><td class="n"><b style="color:var(--dementia)">${v}</b></td><td class="n">${(100*v/t.dementia).toFixed(1)}%</td></tr>`).join('');

  const hMax = Math.max(...AGG.health_staff_avg.map(([k,v])=>v), 0.1);
  const dMax = Math.max(...AGG.dem_staff_avg.map(([k,v])=>v), 0.1);
  const hStaffRows = AGG.health_staff_avg.map(([k,v]) =>
    `<div class="brow"><span class="nm">${k}</span><div class="bar"><i style="width:${v/hMax*100}%;background:var(--health)"></i></div><span class="vv"><b>${v}</b> 명/시설</span></div>`).join('');
  const dStaffRows = AGG.dem_staff_avg.map(([k,v]) =>
    `<div class="brow"><span class="nm">${k}</span><div class="bar"><i style="width:${v/dMax*100}%;background:var(--dementia)"></i></div><span class="vv"><b>${v}</b> 명/시설</span></div>`).join('');

  const equipCards = AGG.equip_rate.map(([k,p]) =>
    `<div class="e"><div class="nm">${k}</div><div class="pct">${p}%</div><div class="bar"><i style="width:${p}%"></i></div></div>`).join('');

  const progTags = AGG.program_top.map(([k,v]) =>
    `<span>${k}<b>${v}</b></span>`).join('');

  document.getElementById('dashwrap').innerHTML = `
    ${kpis}
    <div class="card">
      <h2>시·도별 시설 분포 <span class="sub">건강생활 + 치매, 누적 막대</span></h2>
      ${sidoBars}
      <div class="note">서울·경기·경남 등 인구 밀집 시·도에 시설 다수 집중. 세종/제주는 단일 자릿수.</div>
    </div>
    <div class="cols2">
      <div class="card">
        <h2>건강생활지원센터 유형</h2>
        <table class="tidy"><thead><tr><th>유형</th><th style="text-align:right">수</th><th style="text-align:right">비율</th></tr></thead><tbody>${hSubRows}</tbody></table>
      </div>
      <div class="card">
        <h2>치매센터 유형</h2>
        <table class="tidy"><thead><tr><th>유형</th><th style="text-align:right">수</th><th style="text-align:right">비율</th></tr></thead><tbody>${dSubRows}</tbody></table>
      </div>
    </div>
    <div class="cols2">
      <div class="card">
        <h2>건강생활지원센터 평균 인력 구성 <span class="sub">시설당 명</span></h2>
        ${hStaffRows}
      </div>
      <div class="card">
        <h2>치매센터 평균 인력 구성 <span class="sub">시설당 명</span></h2>
        ${dStaffRows}
      </div>
    </div>
    <div class="card">
      <h2>건강생활지원센터 장비/사업 보유율 <span class="sub">전체 ${t.health}개소 기준</span></h2>
      <div class="equipgrid">${equipCards}</div>
    </div>
    <div class="card">
      <h2>건강생활지원센터 사업 분야 빈도 <span class="sub">건강증진사업 내용 키워드 상위 ${AGG.program_top.length}</span></h2>
      <div class="tagcloud">${progTags}</div>
    </div>
  `;
}
</script>
